<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대전대 식단 생성기</title>
    <style>
        /* ===== Reset & Base ===== */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans KR', sans-serif;
            background: #eef3fa;
            color: #2d3748;
            min-height: 100vh;
            padding: 28px 20px 48px;
        }

        /* ===== Layout ===== */
        .page-wrapper {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* ===== Page Header ===== */
        .page-header {
            display: flex;
            align-items: center;
            gap: 14px;
            padding-bottom: 4px;
        }

        .header-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #6DAEDB, #4D8FAC);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
            box-shadow: 0 4px 12px rgba(77,143,172,0.35);
        }

        .page-header h1 {
            font-size: 20px;
            font-weight: 700;
            color: #1a202c;
            letter-spacing: -0.3px;
        }

        .page-header p {
            font-size: 12.5px;
            color: #8898aa;
            margin-top: 3px;
        }

        /* ===== Card ===== */
        .card {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 2px 14px rgba(0,0,0,0.07);
            padding: 20px 24px;
        }

        .card-label {
            font-size: 10.5px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #b0bec5;
            margin-bottom: 14px;
        }

        /* ===== Toolbar ===== */
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }

        .toolbar-sep {
            width: 1px;
            height: 26px;
            background: #e8edf3;
            margin: 0 2px;
        }

        /* ===== Buttons ===== */
        button {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 8px 15px;
            border: none;
            border-radius: 9px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.13s ease, box-shadow 0.13s ease, opacity 0.13s ease;
            font-family: inherit;
            letter-spacing: -0.2px;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 5px 14px rgba(0,0,0,0.13);
        }

        button:active {
            transform: translateY(0px);
            opacity: 0.88;
        }

        .btn-copy {
            background: linear-gradient(135deg, #667eea, #5a67d8);
            color: #fff;
            box-shadow: 0 3px 8px rgba(102,126,234,0.35);
        }

        .btn-input {
            background: linear-gradient(135deg, #4BC0C8, #2eada6);
            color: #fff;
            box-shadow: 0 3px 8px rgba(43,173,166,0.28);
        }

        .btn-util {
            background: linear-gradient(135deg, #f6ad55, #e89430);
            color: #fff;
            box-shadow: 0 3px 8px rgba(232,148,48,0.3);
        }

        .btn-clear {
            background: linear-gradient(135deg, #fc8181, #e53e3e);
            color: #fff;
            box-shadow: 0 3px 8px rgba(229,62,62,0.28);
        }

        .btn-date {
            background: linear-gradient(135deg, #76e3a0, #38a169);
            color: #fff;
            box-shadow: 0 3px 8px rgba(56,161,105,0.3);
        }

        .btn-date2 {
            background: linear-gradient(135deg, #68d7e2, #2c9dab);
            color: #fff;
            box-shadow: 0 3px 8px rgba(44,157,171,0.3);
        }

        /* ===== Title Row ===== */
        .title-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 18px;
        }

        .title-badge {
            font-size: 12px;
            font-weight: 600;
            color: #718096;
            background: #f7fafc;
            border: 1px solid #e2e8f0;
            border-radius: 7px;
            padding: 6px 11px;
            white-space: nowrap;
        }

        #tableTitle {
            flex: 1;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            padding: 9px 14px;
            font-size: 15px;
            font-weight: 600;
            color: #2d3748;
            transition: border-color 0.15s, box-shadow 0.15s;
            outline: none;
            font-family: inherit;
            background: #fafcff;
        }

        #tableTitle:focus {
            border-color: #667eea;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.13);
        }

        #tableTitle::placeholder {
            color: #c5cfe0;
            font-weight: 400;
        }

        /* ===== Table Wrapper ===== */
        .table-scroll {
            overflow-x: auto;
            border-radius: 12px;
            border: 1.5px solid #dce8f5;
        }

        /* ===== Table ===== */
        .tbl_st {
            width: 100%;
            border-collapse: collapse;
            font-size: 13.5px;
            text-align: center;
        }

        /* Header row */
        .tbl_st thead th {
            padding: 13px 10px;
            font-weight: 700;
            white-space: nowrap;
        }

        .tbl_st thead th:first-child {
            background: #e8f5e9;
            color: #2e7d32;
            border-right: 2px solid #c8e6c9;
            width: 80px;
        }

        .tbl_st thead th:not(:first-child) {
            background: linear-gradient(180deg, #e3f2fd, #daeaf8);
            color: #1565c0;
            border-left: 1px solid #bbdefb;
            border-bottom: 2px solid #90caf9;
        }

        /* Body row header */
        .tbl_st tbody th {
            padding: 12px 10px;
            background: #f1f8f2;
            color: #276749;
            font-weight: 700;
            border-bottom: 1px solid #c8e6c9;
            border-right: 2px solid #c8e6c9;
            white-space: pre-line;
            min-width: 72px;
            font-size: 13px;
        }

        .tbl_st tbody tr:last-child th {
            border-bottom: none;
        }

        /* Body cells */
        .tbl_st td {
            padding: 8px;
            border-bottom: 1px solid #edf2f7;
            border-left: 1px solid #edf2f7;
            vertical-align: top;
            background: #fff;
        }

        .tbl_st tbody tr:last-child td {
            border-bottom: none;
        }

        .tbl_st tbody tr:hover td {
            background: #f8fbff;
        }

        /* ===== Inputs inside table ===== */
        .tbl_st textarea {
            width: 100%;
            min-height: 112px;
            box-sizing: border-box;
            border: 1.5px solid transparent;
            border-radius: 8px;
            padding: 7px 9px;
            resize: vertical;
            font-size: 13px;
            font-family: inherit;
            vertical-align: top;
            color: #2d3748;
            background: transparent;
            transition: border-color 0.15s, background 0.15s;
            line-height: 1.65;
        }

        .tbl_st textarea:focus {
            outline: none;
            border-color: #90cdf4;
            background: #ebf8ff;
        }

        .tbl_st textarea::placeholder {
            color: #d1dce8;
            font-size: 11.5px;
        }

        .tbl_st input[type="text"] {
            width: 100%;
            box-sizing: border-box;
            border: 1.5px solid transparent;
            border-radius: 7px;
            padding: 5px 6px;
            font-size: 13px;
            font-family: inherit;
            text-align: center;
            font-weight: 700;
            color: #1565c0;
            background: transparent;
            transition: border-color 0.15s, background 0.15s;
        }

        .tbl_st input[type="text"]:focus {
            outline: none;
            border-color: #90cdf4;
            background: #fff;
        }

        .tbl_st input[type="text"]::placeholder {
            color: #90bde0;
            font-size: 11.5px;
            font-weight: 400;
        }

        /* ===== Batch Input Section ===== */
        .batch-row {
            display: flex;
            gap: 14px;
            align-items: flex-start;
        }

        #allTextarea {
            flex: 1;
            min-height: 96px;
            padding: 10px 14px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 13px;
            font-family: inherit;
            color: #2d3748;
            resize: vertical;
            transition: border-color 0.15s, box-shadow 0.15s;
            outline: none;
            background: #fafcff;
        }

        #allTextarea:focus {
            border-color: #667eea;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.12);
        }

        #allTextarea::placeholder {
            color: #c5cfe0;
            font-size: 12.5px;
        }

        .batch-controls {
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-width: 120px;
        }

        #allSelect {
            width: 100%;
            padding: 9px 12px;
            border: 2px solid #e2e8f0;
            border-radius: 9px;
            font-size: 13px;
            font-family: inherit;
            font-weight: 600;
            color: #2d3748;
            background: #fafcff;
            cursor: pointer;
            outline: none;
            transition: border-color 0.15s;
        }

        #allSelect:focus {
            border-color: #667eea;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 13px;
            color: #718096;
            cursor: pointer;
            user-select: none;
            padding: 4px 2px;
        }

        .checkbox-label input[type="checkbox"] {
            width: 15px;
            height: 15px;
            cursor: pointer;
            accent-color: #667eea;
        }
    </style>
</head>

<body>
    <div class="page-wrapper">

        <!-- Page Header -->
        <div class="page-header">
            <div class="header-icon">🍱</div>
            <div>
                <h1>대전대 식단 생성기</h1>
                <p>주간 식단표를 작성하고 HTML 코드로 복사합니다</p>
            </div>
        </div>

        <!-- Toolbar Card -->
        <div class="card">
            <div class="card-label">도구</div>
            <div class="toolbar">
                <button type="button" class="btn-copy" onclick="copyTableHTML()">
                    📋 테이블 HTML 복사
                </button>
                <div class="toolbar-sep"></div>
                <button type="button" class="btn-input" onclick="inputHtmlAll()">
                    📥 HTML 일괄 입력
                </button>
                <button type="button" class="btn-input" onclick="inputExcelAll()">
                    📊 엑셀 일괄 입력
                </button>
                <div class="toolbar-sep"></div>
                <button type="button" class="btn-util" onclick="removeSpace()">
                    🧹 빈칸 제거
                </button>
                <button type="button" class="btn-clear" onclick="allClear()">
                    🗑 클리어
                </button>
                <div class="toolbar-sep"></div>
                <button type="button" class="btn-date" onclick="inputDate()">
                    📅 이번주 날짜
                </button>
                <button type="button" class="btn-date2" onclick="inputNextDate()">
                    📅 다음주 날짜
                </button>
            </div>
        </div>

        <!-- Table Card -->
        <div class="card">
            <div class="card-label">식단표</div>

            <div class="title-row">
                <span class="title-badge">제목</span>
                <input type="text" id="tableTitle" placeholder="예) 혜화문화관">
            </div>

            <div class="table-scroll">
                <table class="tbl_st" id="mealTable">
                    <caption></caption>
                    <thead>
                        <tr id="hdTr">
                            <th>구분</th>
                            <th><input type="text" placeholder="날짜 입력"></th>
                            <th><input type="text" placeholder="날짜 입력"></th>
                            <th><input type="text" placeholder="날짜 입력"></th>
                            <th><input type="text" placeholder="날짜 입력"></th>
                            <th><input type="text" placeholder="날짜 입력"></th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <th>조식</th>
                            <td><textarea placeholder="식단 내용 입력 (줄바꿈은 엔터)"></textarea></td>
                            <td><textarea placeholder="식단 내용 입력 (줄바꿈은 엔터)"></textarea></td>
                            <td><textarea placeholder="식단 내용 입력 (줄바꿈은 엔터)"></textarea></td>
                            <td><textarea placeholder="식단 내용 입력 (줄바꿈은 엔터)"></textarea></td>
                            <td><textarea placeholder="식단 내용 입력 (줄바꿈은 엔터)"></textarea></td>
                        </tr>
                        <tr>
                            <th>중식<br>[Extras Bar]</th>
                            <td><textarea placeholder="식단 내용 입력 (줄바꿈은 엔터)"></textarea></td>
                            <td><textarea placeholder="식단 내용 입력 (줄바꿈은 엔터)"></textarea></td>
                            <td><textarea placeholder="식단 내용 입력 (줄바꿈은 엔터)"></textarea></td>
                            <td><textarea placeholder="식단 내용 입력 (줄바꿈은 엔터)"></textarea></td>
                            <td><textarea placeholder="식단 내용 입력 (줄바꿈은 엔터)"></textarea></td>
                        </tr>
                        <tr>
                            <th>석식</th>
                            <td><textarea placeholder="식단 내용 입력 (줄바꿈은 엔터)"></textarea></td>
                            <td><textarea placeholder="식단 내용 입력 (줄바꿈은 엔터)"></textarea></td>
                            <td><textarea placeholder="식단 내용 입력 (줄바꿈은 엔터)"></textarea></td>
                            <td><textarea placeholder="식단 내용 입력 (줄바꿈은 엔터)"></textarea></td>
                            <td><textarea placeholder="식단 내용 입력 (줄바꿈은 엔터)"></textarea></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Batch Input Card -->
        <div class="card">
            <div class="card-label">일괄 입력</div>
            <div class="batch-row">
                <textarea id="allTextarea" placeholder="HTML 또는 엑셀 데이터를 여기에 붙여넣으세요"></textarea>
                <div class="batch-controls">
                    <select id="allSelect">
                        <option value="조식">조식</option>
                        <option value="중식">중식</option>
                        <option value="석식">석식</option>
                    </select>
                    <label class="checkbox-label" for="pasteAt">
                        <input type="checkbox" id="pasteAt">
                        덮어쓰기 여부
                    </label>
                </div>
            </div>
        </div>

    </div>

    <script>
        // 열 추가 함수
        function addCol() {
            const headRow = document.querySelector('#hdTr');
            const bodyRows = document.querySelectorAll('#mealTable tbody tr');
            if(headRow.children.length > 5){
                alert('열은 5개까지만 추가 가능합니다.')
                return;
            }

            // 헤더에 날짜 입력 필드가 있는 th 추가
            const newHeaderTh = document.createElement('th');
            const dateInput = document.createElement('input');
            dateInput.type = 'text';
            dateInput.placeholder = '날짜 입력';
            newHeaderTh.appendChild(dateInput);
            headRow.appendChild(newHeaderTh);

            // 각 바디 행에 식단 내용 입력 textarea가 있는 td 추가
            bodyRows.forEach(row => {
                const newBodyTd = document.createElement('td');
                const mealTextarea = document.createElement('textarea');
                mealTextarea.placeholder = '식단 내용 입력\n(줄바꿈은 엔터)';
                newBodyTd.appendChild(mealTextarea);
                row.appendChild(newBodyTd);
            });
        }

        // 열 제거 함수
        function removeCol() {
            const headRow = document.querySelector('#hdTr');
            const bodyRows = document.querySelectorAll('#mealTable tbody tr');

            // 첫 번째 '구분' 열을 제외하고 열이 있는지 확인
            if (headRow.children.length > 1) {
                // 헤더의 마지막 열 제거
                headRow.removeChild(headRow.lastChild);

                // 각 바디 행의 마지막 열 제거
                bodyRows.forEach(row => {
                    if (row.children.length > 1) { // 첫 번째 th 제외
                        row.removeChild(row.lastChild);
                    }
                });
            } else {
                alert('더 이상 열을 제거할 수 없습니다.');
            }
        }

        // 텍스트를 클립보드에 복사하는 헬퍼 함수
        function copy(text) {
            var textarea = document.createElement("textarea");
            textarea.value = text;
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand("copy");
            document.body.removeChild(textarea);
            alert('HTML 코드가 클립보드에 복사되었습니다!');
        }

        // 테이블의 현재 상태를 읽어 HTML 코드를 생성하고 복사하는 함수
        function copyTableHTML() {
            const tableTitle = document.getElementById('tableTitle').value || '제목 없음';
            const mealTable = document.getElementById('mealTable');

            // 새로운 div와 table 요소 생성
            const outputDiv = document.createElement('div');
            const outputTitle = document.createElement('h4');
            outputTitle.className = 'tit2'; // 기존 클래스 유지
            outputTitle.textContent = tableTitle; // 제목 적용
            outputDiv.appendChild(outputTitle);

            const outputTableWrapper = document.createElement('div');
            outputTableWrapper.className = 'tbl_st scroll_gr mgt10'; // 기존 클래스 유지

            const outputTable = document.createElement('table');
            const caption = document.createElement('caption');
            caption.textContent = tableTitle + ' 식단 내용';
            outputTable.appendChild(caption);

            // colgroup 및 col 요소 생성 및 추가
            const outputColgroup = document.createElement('colgroup');
            const numberOfCols = mealTable.querySelector('#hdTr').children.length; // 현재 테이블의 열 개수 파악

            for (let i = 0; i < numberOfCols; i++) {
                const outputCol = document.createElement('col');
                if (i === 0) {
                    outputCol.style.width = '20%'; // 첫 번째 열 (구분) 너비 고정
                } else {
                    // outputCol.style.width = 'auto'; // 나머지 열 너비 자동 분배
                    outputCol.style.width = (80 / (numberOfCols-1)) + '%';
                }


                outputColgroup.appendChild(outputCol);
            }
            outputTable.appendChild(outputColgroup); // table의 첫 번째 자식으로 colgroup 추가

            // createTHead()와 createTBody() 메서드를 사용하여 테이블 섹션 생성 (에러 방지)
            const outputThead = outputTable.createTHead();
            const outputTbody = outputTable.createTBody();

            const outputHeaderRow = document.createElement('tr');
            outputThead.appendChild(outputHeaderRow);

            // 헤더 복사 (날짜 포함) - font-weight: bold; 만 인라인 스타일로 추가
            const originalHeaderCells = mealTable.querySelectorAll('#hdTr th');
            originalHeaderCells.forEach((cell, index) => {
                const newTh = document.createElement('th');
                newTh.style.fontWeight = 'bold'; // th에 font-weight: bold; 인라인 스타일 적용

                // 첫 번째 셀 ('구분')은 그대로 복사
                if (index === 0) {
                    newTh.innerHTML = cell.innerHTML; // '구분' 텍스트 복사
                } else {
                    // 날짜 입력 필드의 값을 읽어와 텍스트로 추가
                    const inputElement = cell.querySelector('input[type="text"]');
                    newTh.textContent = inputElement ? inputElement.value : '';
                }
                outputHeaderRow.appendChild(newTh);
            });

            // 바디 복사 (식단 내용 포함) - tr의 height: 150px; 만 인라인 스타일로 추가
            const originalBodyRows = mealTable.querySelectorAll('tbody tr');
            originalBodyRows.forEach(row => {
                const newTr = document.createElement('tr');
                newTr.style.height = '150px'; // tr의 height만 인라인 스타일로 유지

                const originalCells = row.querySelectorAll('th, td');
                originalCells.forEach((cell, index) => {
                    if (index === 0) {
                        // 첫 번째 셀 (예: 조식, 중식)은 th로 그대로 복사
                        const newTh = document.createElement('th');
                        newTh.innerHTML = cell.innerHTML; // 텍스트 복사
                        newTr.appendChild(newTh);
                    } else {
                        // 나머지 셀 (식단 내용)은 td로 복사
                        const newTd = document.createElement('td');
                        const textareaElement = cell.querySelector('textarea');
                        // textarea의 값을 읽어와 <br>로 줄바꿈하여 innerHTML로 추가
                        if (textareaElement) {
                            newTd.innerHTML = textareaElement.value.replace(/\n/g, '<br>');
                        } else {
                            newTd.innerHTML = '-'; // 내용이 없으면 '-' 표시 (원하는 대로 수정 가능)
                        }
                        newTr.appendChild(newTd);
                    }
                });
                outputTbody.appendChild(newTr); // 생성된 tr을 outputTbody에 추가
            });

            // 생성된 table을 wrapper에 추가
            outputTableWrapper.appendChild(outputTable);
            outputDiv.appendChild(outputTableWrapper);

            // 생성된 HTML 요소의 내부 HTML 코드를 가져옴
            const htmlToCopy = outputDiv.outerHTML;

            // 복사 함수 호출
            copy(htmlToCopy);
        }

        // Html 일괄 입력
        function inputHtmlAll() {
            const data = document.getElementById('allTextarea').value;
            const parser = new DOMParser();
            const doc = parser.parseFromString(data, 'text/html');
            const parseData = doc.body.firstElementChild;

            document.querySelector('#tableTitle').value = parseData.querySelector('.tit2').innerText;

            const dataTh = parseData.querySelectorAll('table thead tr th:nth-child(n+2)');
            dataTh.forEach((v, i) => {
               document.querySelector(`#hdTr th:nth-child(${i+2}) input`).value = v.innerText;
            });
            const dataTd1 = parseData.querySelectorAll('table tbody tr:nth-child(1) td:nth-child(n+2)');
            dataTd1.forEach((v, i) => {
               document.querySelector(`#mealTable tbody tr:nth-child(1) td:nth-child(${i+2}) textarea`).value = replaceText(v.innerHTML);
            });
            const dataTd2 = parseData.querySelectorAll('table tbody tr:nth-child(2) td:nth-child(n+2)');
            dataTd2.forEach((v, i) => {
               document.querySelector(`#mealTable tbody tr:nth-child(2) td:nth-child(${i+2}) textarea`).value = replaceText(v.innerHTML);
            });
            const dataTd3 = parseData.querySelectorAll('table tbody tr:nth-child(3) td:nth-child(n+2)');
            dataTd3.forEach((v, i) => {
               document.querySelector(`#mealTable tbody tr:nth-child(3) td:nth-child(${i+2}) textarea`).value = replaceText(v.innerHTML);
            });
        }

        // Excel 일괄 입력
        function inputExcelAll() {
            const data = document.getElementById('allTextarea').value.trim();
            const type = document.getElementById('allSelect').value;

            const splitData = [];
            let dataTd = null;
            let max = 0;
            data.split('\n').forEach(v => {
               const arr = v.split('\t');
               splitData.push(arr);
               max = max < arr.length ? arr.length : max;
            });

            if(type == '조식'){
                dataTd = document.querySelectorAll('table tbody tr:nth-child(1) td:nth-child(n+2)');
            }
            else if(type == '중식'){
                dataTd = document.querySelectorAll('table tbody tr:nth-child(2) td:nth-child(n+2)');
            }
            else if(type == '석식'){
                dataTd = document.querySelectorAll('table tbody tr:nth-child(3) td:nth-child(n+2)');
            }
            else{
                alert('잘못된 값');
                return;
            }

            const realArr = [];

            for(let i = 0; i < max; i++){
                const arr = [];
                for(let j = 0; j < splitData.length; j++){
                    arr.push(splitData[j][i]);
                }
                realArr.push(arr);
            }

            dataTd.forEach((v, i) => {
               v.querySelector('textarea').value = replaceText(realArr[i].join('\n'));
            });
        }

        // 문자 수정
        function replaceText(str) {
            return str.replaceAll('<br>', '\n')
                        .replaceAll('<br />', '\n')
                        .replaceAll('&amp;', '&')
                        .replaceAll('&lt;', '<')
                        .replaceAll('&gt;', '>')
                        .replaceAll('&nbsp;', ' ')
                        .replaceAll('&quot;', '"')
                        .replaceAll('&apos;', "'");
        }

        // 빈칸, - 제거
        function removeSpace(){
            const mealTable = document.querySelector('#mealTable');
            const originalBodyRows = mealTable.querySelectorAll('tbody tr');
            originalBodyRows.forEach(row => {
                const originalCells = row.querySelectorAll('td');
                originalCells.forEach((cell, index) => {
                    const textareaElement = cell.querySelector('textarea');
                    textareaElement.value = textareaElement.value.split('\n').filter((v)=>v.replace(/[0\-X]/g, '') != '').map((v)=>v.trim()).join('\n');
                });
            });
        }

        // 전부 제거
        function allClear(){
            const mealTable = document.querySelector('#mealTable');
            const originalBodyRows = mealTable.querySelectorAll('tbody tr');
            originalBodyRows.forEach(row => {
                const originalCells = row.querySelectorAll('td');
                originalCells.forEach((cell, index) => {
                    const textareaElement = cell.querySelector('textarea');
                    textareaElement.value = '';
                });
            });
        }

        // 날짜를 'YYYY.MM.DD.' 형식으로 포맷하는 헬퍼 함수입니다.
        function formatAsYYYYMMDD_Dot(date) {
            const year = date.getFullYear();
            const month = (date.getMonth() + 1).toString().padStart(2, '0');
            const day = date.getDate().toString().padStart(2, '0');
            return `${year}.${month}.${day}.`;
        }

        // 이번 주 월요일부터 금요일까지의 날짜를 구하는 함수입니다.
        function getWeekdayDates(nextWeekAt) {
            const today = new Date();
            const currentDay = today.getDay();

            const daysToSubtract = (currentDay + 6) % 7;
            let daysToAdd = (1 - currentDay + 7) % 7;
            if (daysToAdd === 0) {
                daysToAdd = 7;
            }

            const mondayDate = new Date(today);
            if(nextWeekAt){
                mondayDate.setDate(today.getDate() + daysToAdd);
            }
            else{
                mondayDate.setDate(today.getDate() - daysToSubtract);
            }

            const weekdays = [];
            const currentDate = new Date(mondayDate);

            for (let i = 0; i < 5; i++) {
                weekdays.push(formatAsYYYYMMDD_Dot(currentDate));
                currentDate.setDate(currentDate.getDate() + 1);
            }

            return weekdays;
        }

        // 날짜 자동입력
        function inputDate(){
            const weekDates = getWeekdayDates();
            weekDates.forEach((v, i) => {
                document.querySelector(`#hdTr th:nth-child(${i+2}) input`).value = v;
            });
        }

        // 다음주 날짜 자동입력
        function inputNextDate(){
            const weekDates = getWeekdayDates(true);
            weekDates.forEach((v, i) => {
                document.querySelector(`#hdTr th:nth-child(${i+2}) input`).value = v;
            });
        }

        window.onload = function() {
            // 붙여넣기 하면 자동으로 입력
            const tbody = document.getElementsByTagName('tbody')[0];
            var text = '';
            var pasteFlag = false;
            tbody.addEventListener('paste', function(e){
                const pasteAt = document.querySelector('#pasteAt').checked;
                if(e.target.localName == 'textarea' && pasteAt){
                    text = e.clipboardData.getData('text');
                    pasteFlag = true;
                }
            });
            tbody.addEventListener('input', function(e){
                if(pasteFlag){
                    const textareas = e.target.closest('tr').querySelectorAll('textarea');
                    const splitData = [];
                    let max = 0;
                    const index = Array.prototype.indexOf.call(textareas, e.target);

                    text.split('\n').forEach(v => {
                        const arr = v.split('\t');
                        splitData.push(arr);
                        max = max < arr.length ? arr.length : max;
                    });

                    const realArr = [];

                    for(let i = 0; i < max; i++){
                        const arr = [];
                        for(let j = 0; j < splitData.length; j++){
                            arr.push(splitData[j][i]);
                        }
                        realArr.push(arr);
                    }

                    textareas.forEach((v, i) => {
                        if(realArr[i-index] != undefined && i >= index){
                            v.value = replaceText(realArr[i-index].join('\n'));
                        }
                    });

                    removeSpace();
                    pasteFlag = false;
                    text = '';
                }
            });
        };
    </script>
